<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Homeworld</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c;
            --accent-indigo: #6366f1;
            --accent-hover: #4f46e5;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --text-light: #e2e8f0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(99, 102, 241, 0.1) 0%, transparent 40%);
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-focus:focus {
            border-color: var(--accent-indigo);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .gradient-text {
            background: linear-gradient(135deg, #fff, var(--accent-indigo));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="glass p-10 rounded-[3rem] shadow-2xl w-full max-w-md animate-fade-in mx-4">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-[2rem] flex items-center justify-center text-white shadow-xl mx-auto mb-8 transform rotate-12">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="4"></circle><line x1="21.17" y1="8" x2="12" y2="8"></line><line x1="3.95" y1="6.06" x2="8.54" y2="14"></line><line x1="10.88" y1="21.94" x2="15.46" y2="14"></line></svg>
            </div>
            <h1 class="text-4xl font-bold gradient-text mb-3">Homeworld</h1>
            <p class="text-indigo-200/60 text-sm tracking-wide">Enter the next dimension of home control</p>
        </div>

        <form id="loginForm" action="/api/auth/login" method="POST" class="space-y-6">
            <div>
                <label for="username" class="block text-[10px] font-bold text-indigo-300 uppercase tracking-[0.2em] mb-3 ml-2">Commander Identity</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none input-focus transition-all text-white placeholder-white/20"
                    placeholder="Username">
            </div>

            <div class="relative">
                <label for="password" class="block text-[10px] font-bold text-indigo-300 uppercase tracking-[0.2em] mb-3 ml-2">Access Key Override</label>
                <div class="relative">
                    <input type="password" id="password" name="password" required
                        class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none input-focus transition-all text-white placeholder-white/20 pr-14"
                        placeholder="••••••••">
                    <button type="button" id="togglePassword" class="absolute right-5 top-1/2 -translate-y-1/2 text-white/30 hover:text-white transition-colors">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="error-container" class="hidden text-rose-400 text-xs font-medium text-center bg-rose-400/5 py-3 rounded-2xl border border-rose-400/20 animate-fade-in">
                Authorization failed. Check your credentials.
            </div>

            <button type="submit"
                class="w-full py-5 bg-gradient-to-r from-indigo-600 to-indigo-500 text-white rounded-2xl font-bold tracking-[0.1em] transition-all shadow-xl active:scale-[0.98] hover:shadow-indigo-500/20 hover:-translate-y-0.5 mt-4">
                ENGAGE
            </button>
        </form>

        <div class="mt-10 text-center">
            <p class="text-[10px] text-white/20 uppercase tracking-[0.3em]">System Unified HomeWorld Protocol</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'invalid') {
            document.getElementById('error-container').classList.remove('hidden');
        }

        // Port Synchronization: Target the definitive API_BASE or fallback to 3003
        // [Tactical] Dynamic API Resolution System
        const INJECTED_BASE = window.CONFIG?.API_BASE;
        const DEFAULT_BASE = `${window.location.origin}/homeworld`;
        
        // If injected base is localhost but we're NOT on localhost, use the current hostname
        const API_BASE = (INJECTED_BASE && !INJECTED_BASE.includes('localhost')) 
            ? INJECTED_BASE 
            : (window.location.hostname !== 'localhost' ? DEFAULT_BASE : (INJECTED_BASE || DEFAULT_BASE));
            
        console.log(`[Homeworld] Auth Connectivity Bridge initialized: ${API_BASE}`);
        if (API_BASE) {
            document.getElementById('loginForm').action = `${API_BASE}/api/auth/login`;
        }

        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeOffIcon = document.getElementById('eyeOffIcon');

        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            eyeIcon.classList.toggle('hidden');
            eyeOffIcon.classList.toggle('hidden');
        });
    </script>
</body>
</html>
